<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EZ론 관리자</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:#f3f6fb;color:#17213c}button,input,select,textarea{font:inherit}.login{min-height:100vh;display:grid;place-items:center}.login-box{width:min(420px,calc(100% - 32px));background:#fff;padding:32px;border-radius:18px;box-shadow:0 18px 55px rgba(0,0,0,.12)}h1{margin:0 0 20px}.field{display:grid;gap:7px;margin:13px 0}.field input{height:46px;border:1px solid #ccd5e5;border-radius:10px;padding:0 12px}.primary{border:0;background:#071f70;color:#fff;border-radius:10px;padding:13px 18px;font-weight:800;cursor:pointer}.app{display:none}.top{background:#071f70;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}.layout{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;padding:18px}.panel{background:#fff;border-radius:15px;box-shadow:0 5px 20px rgba(20,35,75,.08);overflow:hidden}.panel-head{padding:16px 18px;border-bottom:1px solid #e7ebf2;display:flex;justify-content:space-between;align-items:center}.list{max-height:calc(100vh - 150px);overflow:auto}.item{padding:15px 18px;border-bottom:1px solid #edf0f5;cursor:pointer}.item.unread{background:#fff8e5;border-left:5px solid #f0a500}.item.selected{background:#eef4ff}.item strong{display:block;margin-bottom:6px}.meta{font-size:13px;color:#68748b}.badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#e8edf7;font-size:12px;margin-left:6px}.detail{padding:18px}.detail-grid{display:grid;grid-template-columns:100px 1fr;gap:10px;margin-bottom:18px}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{border:0;border-radius:9px;padding:10px 13px;font-weight:800;cursor:pointer}.read{background:#dbeafe}.done{background:#d1fae5}.delete{background:#fee2e2;color:#a00}.memo{width:100%;min-height:90px;border:1px solid #ccd5e5;border-radius:10px;padding:10px;margin:12px 0}.tabs{display:flex;gap:6px}.tabs button{border:0;padding:9px 12px;border-radius:9px;cursor:pointer}.tabs button.active{background:#071f70;color:#fff}.chat-view{display:flex;flex-direction:column;height:calc(100vh - 210px)}.messages{flex:1;overflow:auto;background:#f7f9fc;padding:15px}.msg{max-width:80%;padding:10px 12px;border-radius:13px;margin:7px 0}.msg.user{background:#fff;border:1px solid #dce3ef}.msg.admin{background:#071f70;color:#fff;margin-left:auto}.reply{display:flex;gap:8px;padding:12px;border-top:1px solid #e5e9f1}.reply input{flex:1;border:1px solid #ccd5e5;border-radius:9px;padding:0 10px}.empty{padding:30px;color:#7a859b;text-align:center}@media(max-width:900px){.layout{grid-template-columns:1fr}.list{max-height:420px}.chat-view{height:520px}}
</style></head><body>
<div class="login" id="login"><form class="login-box" onsubmit="loginAdmin(event)"><h1>관리자 로그인</h1><div class="field"><label>이메일</label><input id="email" type="email" required></div><div class="field"><label>비밀번호</label><input id="password" type="password" required></div><button class="primary" style="width:100%">로그인</button><p id="loginMsg" class="meta"></p></form></div>
<div class="app" id="app"><header class="top"><b>EZ론 관리자센터</b><button onclick="firebase.auth().signOut()">로그아웃</button></header><main class="layout">
<section class="panel"><div class="panel-head"><div class="tabs"><button id="tabInquiry" class="active" onclick="switchTab('inquiry')">신청현황</button><button id="tabChat" onclick="switchTab('chat')">실시간상담</button></div><span id="count" class="badge">0건</span></div><div class="list" id="masterList"></div></section>
<section class="panel"><div id="detail" class="detail"><div class="empty">왼쪽 목록을 선택하세요.</div></div></section>
</main></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
<script>
if(!window.FIREBASE_CONFIG||String(window.FIREBASE_CONFIG.apiKey).startsWith('YOUR_')) alert('firebase-config.js 설정이 필요합니다.');
firebase.initializeApp(window.FIREBASE_CONFIG);const db=firebase.firestore();const auth=firebase.auth();
let tab='inquiry',unsubscribe=null,selectedId=null,selectedData=null,messageUnsub=null;
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmt=ts=>ts?.toDate?ts.toDate().toLocaleString('ko-KR'):'-';
function loginAdmin(e){e.preventDefault();loginMsg.textContent='로그인 중...';auth.signInWithEmailAndPassword(email.value,password.value).catch(err=>loginMsg.textContent='로그인 실패: '+err.message)}
auth.onAuthStateChanged(user=>{login.style.display=user?'none':'grid';app.style.display=user?'block':'none';if(user)startList();else{if(unsubscribe)unsubscribe();if(messageUnsub)messageUnsub();}});
function switchTab(next){tab=next;selectedId=null;selectedData=null;tabInquiry.classList.toggle('active',tab==='inquiry');tabChat.classList.toggle('active',tab==='chat');detail.innerHTML='<div class="empty">왼쪽 목록을 선택하세요.</div>';startList()}
function startList(){if(unsubscribe)unsubscribe();const col=tab==='inquiry'?'loanInquiries':'chatRooms';unsubscribe=db.collection(col).orderBy(tab==='inquiry'?'createdAt':'lastMessageAt','desc').limit(200).onSnapshot(s=>{count.textContent=s.size+'건';masterList.innerHTML=s.empty?'<div class="empty">내역이 없습니다.</div>':s.docs.map(d=>listItem(d.id,d.data())).join('')},err=>masterList.innerHTML='<div class="empty">불러오기 오류: '+esc(err.message)+'</div>')}
function listItem(id,x){if(tab==='inquiry')return `<div class="item ${x.read?'':'unread'} ${selectedId===id?'selected':''}" onclick="openItem('${id}')"><strong>${esc(x.name)} <span class="badge">${esc(x.status)}</span></strong><div>${esc(x.phone)} · ${esc(x.amount)}</div><div class="meta">${fmt(x.createdAt)}</div></div>`;return `<div class="item ${x.unreadByAdmin?'unread':''} ${selectedId===id?'selected':''}" onclick="openItem('${id}')"><strong>상담 ${esc(id.slice(0,8))} <span class="badge">${esc(x.status||'대기')}</span></strong><div>${esc(x.lastMessage||'')}</div><div class="meta">${fmt(x.lastMessageAt)}</div></div>`}
async function openItem(id){selectedId=id;const col=tab==='inquiry'?'loanInquiries':'chatRooms';const snap=await db.collection(col).doc(id).get();selectedData=snap.data();if(tab==='inquiry'){await snap.ref.set({read:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});renderInquiry()}else{await snap.ref.set({unreadByAdmin:false},{merge:true});renderChat()}startList()}
function renderInquiry(){const x=selectedData||{};detail.innerHTML=`<h2>${esc(x.name||'')}</h2><div class="detail-grid"><b>연락처</b><span>${esc(x.phone)}</span><b>희망금액</b><span>${esc(x.amount)}</span><b>상태</b><span>${esc(x.status)}</span><b>접수시간</b><span>${fmt(x.createdAt)}</span></div><textarea id="memo" class="memo" placeholder="상담 메모">${esc(x.memo||'')}</textarea><div class="actions"><button class="read" onclick="saveMemo()">메모 저장</button><button class="done" onclick="completeInquiry()">상담완료</button><button class="delete" onclick="deleteInquiry()">삭제</button></div>`}
async function saveMemo(){await db.collection('loanInquiries').doc(selectedId).set({memo:document.getElementById('memo').value.slice(0,1000),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});alert('저장했습니다.')}
async function completeInquiry(){await db.collection('loanInquiries').doc(selectedId).set({status:'상담완료',read:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});selectedData.status='상담완료';renderInquiry()}
async function deleteInquiry(){if(!confirm('이 신청내역을 삭제할까요?'))return;await db.collection('loanInquiries').doc(selectedId).delete();selectedId=null;detail.innerHTML='<div class="empty">삭제되었습니다.</div>'}
function renderChat(){detail.innerHTML=`<div class="detail"><h2>실시간 상담</h2><div class="actions"><button class="done" onclick="closeChat()">상담완료</button><button class="delete" onclick="deleteChat()">대화 삭제</button></div></div><div class="chat-view"><div class="messages" id="messages"></div><form class="reply" onsubmit="replyChat(event)"><input id="replyText" maxlength="500" required placeholder="답변 입력"><button class="primary">전송</button></form></div>`;if(messageUnsub)messageUnsub();messageUnsub=db.collection('chatRooms').doc(selectedId).collection('messages').orderBy('createdAt','asc').limit(200).onSnapshot(s=>{messages.innerHTML=s.docs.map(d=>{const x=d.data();return `<div class="msg ${x.sender==='admin'?'admin':'user'}">${esc(x.text)}<div class="meta">${fmt(x.createdAt)}</div></div>`}).join('');messages.scrollTop=messages.scrollHeight})}
async function replyChat(e){e.preventDefault();const text=replyText.value.trim().slice(0,500);if(!text)return;const room=db.collection('chatRooms').doc(selectedId);const batch=db.batch();batch.set(room,{lastMessage:text,lastMessageAt:firebase.firestore.FieldValue.serverTimestamp(),status:'상담중',unreadByAdmin:false},{merge:true});batch.set(room.collection('messages').doc(),{sender:'admin',text,createdAt:firebase.firestore.FieldValue.serverTimestamp()});await batch.commit();replyText.value=''}
async function closeChat(){await db.collection('chatRooms').doc(selectedId).set({status:'상담완료',unreadByAdmin:false,lastMessageAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});selectedData.status='상담완료';startList()}
async function deleteChat(){if(!confirm('대화방과 메시지를 삭제할까요?'))return;const room=db.collection('chatRooms').doc(selectedId);const ms=await room.collection('messages').limit(500).get();const batch=db.batch();ms.docs.forEach(d=>batch.delete(d.ref));batch.delete(room);await batch.commit();selectedId=null;detail.innerHTML='<div class="empty">삭제되었습니다.</div>'}
</script></body></html>
